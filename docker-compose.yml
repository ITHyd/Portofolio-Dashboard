services:
  db:
    image: postgres:16-alpine
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      POSTGRES_DB: portfolio_dashboard
    # Bound to loopback only — reachable from the host via `psql -h 127.0.0.1 -p 8023`
    # but NOT from the public internet. Backend reaches it via the Docker network.
    ports:
      - "127.0.0.1:8023:5432"
    volumes:
      - portfolio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://portfolio:${POSTGRES_PASSWORD:-portfolio}@db:5432/portfolio_dashboard
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 480
      # Browsers will load the SPA from either 8021 (direct) or 8024 (proxy).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://149.102.158.71:8021,http://149.102.158.71:8024,http://localhost:8021,http://localhost:8024}
      SEED_DATA_DIR: /data
      RUN_SEED: ${RUN_SEED:-1}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8022:8000"
    volumes:
      - ./Portfolio_Register_v4.xlsx:/data/Portfolio_Register_v4.xlsx:ro
      - ./Portfolio Metric Catalogue v0.4.xlsx:/data/Portfolio Metric Catalogue v0.4.xlsx:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8021:80"

  proxy:
    image: nginx:1.27-alpine
    container_name: portfolio_proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "8024:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  portfolio_pgdata:
